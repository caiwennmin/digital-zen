<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Digital Zen — 在信息洪流中，找回你的深度专注力。一个正念生产力伴侣。">
<meta name="theme-color" content="#faf8f5">
<title>Digital Zen</title>
<link rel="stylesheet" href="css/main.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-container">

  <header class="header">
    <div class="logo">
      <span class="logo-text">Digital Zen</span>
      <span class="logo-sub">数字禅</span>
    </div>
    <nav class="nav">
      <button class="nav-btn active" data-view="timer">专注</button>
      <button class="nav-btn" data-view="journal">日记</button>
      <button class="nav-btn" data-view="stats">统计</button>
      <button class="nav-btn auth-logged-out" id="btn-open-auth">登录</button>
      <button class="nav-btn auth-logged-in" id="btn-sync" style="display:none">同步</button>
      <button class="nav-btn auth-logged-in" id="btn-logout" style="display:none">退出</button>
    </nav>
    <span class="user-email auth-logged-in" id="user-email-display" style="display:none"></span>
  </header>

  <!-- -------- Timer -------- -->
  <main id="view-timer" class="view active">
    <div class="timer-card">
      <div class="timer-mode-selector">
        <button class="mode-btn active" data-mode="focus" data-duration="25">专注 25 分钟</button>
        <button class="mode-btn" data-mode="shortBreak" data-duration="5">小憩 5 分钟</button>
        <button class="mode-btn" data-mode="longBreak" data-duration="15">长休 15 分钟</button>
      </div>

      <div class="timer-display">
        <svg class="timer-ring" viewBox="0 0 200 200">
          <circle class="ring-bg" cx="100" cy="100" r="90"/>
          <circle class="ring-progress" cx="100" cy="100" r="90"/>
        </svg>
        <div class="timer-text">
          <span id="timer-minutes">25</span>:<span id="timer-seconds">00</span>
        </div>
      </div>

      <div class="timer-controls">
        <button id="btn-timer-toggle" class="btn-primary">开始专注</button>
        <button id="btn-timer-reset" class="btn-secondary">重置</button>
      </div>

      <div class="ambient-sounds">
        <span class="sound-label">环境音</span>
        <button class="sound-btn" data-sound="rain">雨</button>
        <button class="sound-btn" data-sound="thunder">雷雨</button>
        <button class="sound-btn" data-sound="ocean">海浪</button>
        <button class="sound-btn" data-sound="wind">风声</button>
        <button class="sound-btn" data-sound="forest">森林</button>
        <button class="sound-btn" data-sound="fireplace">篝火</button>
        <button class="sound-btn" data-sound="cafe">咖啡馆</button>
        <button class="sound-btn" data-sound="whitenoise">白噪音</button>
        <button class="sound-btn" data-sound="bowl">颂钵</button>
        <button class="sound-btn active" data-sound="none">静音</button>
      </div>
    </div>
  </main>

  <!-- -------- Journal -------- -->
  <main id="view-journal" class="view">
    <div class="journal-card">
      <h2 class="section-title">每日意图</h2>
      <p class="section-desc">一天开始前，写下今天最重要的三件事。</p>

      <div class="journal-intentions" id="journal-intentions">
        <div class="intention-item">
          <span class="intention-num">01</span>
          <input type="text" class="intention-input" placeholder="今天最重要的一件事…" maxlength="80">
        </div>
        <div class="intention-item">
          <span class="intention-num">02</span>
          <input type="text" class="intention-input" placeholder="第二件…" maxlength="80">
        </div>
        <div class="intention-item">
          <span class="intention-num">03</span>
          <input type="text" class="intention-input" placeholder="第三件…" maxlength="80">
        </div>
      </div>

      <div class="journal-reflection">
        <h3>晚间反思</h3>
        <textarea class="reflection-input" placeholder="今天有什么让你感恩？学到了什么？明天哪里可以做得更好？" rows="4" maxlength="500"></textarea>
      </div>

      <button id="btn-save-journal" class="btn-primary">保存日记</button>
      <p class="save-indicator" id="journal-save-indicator"></p>
    </div>
  </main>

  <!-- -------- Stats -------- -->
  <main id="view-stats" class="view">
    <div class="stats-card">
      <h2 class="section-title">你的数据</h2>
      <p class="section-desc">每一分钟的专注，都算数。</p>

      <div class="stats-grid">
        <div class="stat-box">
          <span class="stat-icon">&circlearrowright;</span>
          <span class="stat-value" id="stat-total-sessions">0</span>
          <span class="stat-label">专注次数</span>
        </div>
        <div class="stat-box">
          <span class="stat-icon">&ominus;</span>
          <span class="stat-value" id="stat-total-minutes">0</span>
          <span class="stat-label">专注分钟</span>
        </div>
        <div class="stat-box">
          <span class="stat-icon">&apid;</span>
          <span class="stat-value" id="stat-streak">0</span>
          <span class="stat-label">连续天数</span>
        </div>
        <div class="stat-box">
          <span class="stat-icon">&compfn;</span>
          <span class="stat-value" id="stat-journal-entries">0</span>
          <span class="stat-label">日记篇数</span>
        </div>
      </div>

      <div class="stats-chart-container" id="weekly-chart">
        <h3>本周趋势</h3>
        <div class="chart-placeholder">
          <div class="chart-bars" id="chart-bars"></div>
        </div>
      </div>

      <button id="btn-reset-stats" class="btn-secondary btn-danger">重置所有数据</button>
    </div>
  </main>

  <footer class="footer">
    <p class="quote" id="daily-quote"></p>
  </footer>

</div>

<script src="js/storage.js"></script>
<script src="js/timer.js"></script>
<script src="js/journal.js"></script>
<script src="js/stats.js"></script>
<script src="js/sounds.js"></script>
<script src="js/auth.js"></script>
  <script src="js/app.js"></script>

  <!-- Auth Modal -->
  <div class="modal-overlay" id="auth-modal">
    <div class="modal-box">
      <button class="modal-close">&times;</button>

      <!-- Login -->
      <div id="auth-login">
        <h3>登录</h3>
        <p class="auth-error"></p>
        <form id="auth-login-form" class="auth-form">
          <label>邮箱</label>
          <input type="email" id="login-email" placeholder="your@email.com" required>
          <label>密码</label>
          <input type="password" id="login-password" placeholder="至少 6 位" required minlength="6">
          <button type="submit" class="btn-primary">登录</button>
        </form>
        <p class="auth-switch">还没有账号？<a href="#" class="auth-toggle">注册</a></p>
      </div>

      <!-- Register -->
      <div id="auth-register" class="hidden">
        <h3>注册</h3>
        <p class="auth-error"></p>
        <form id="auth-register-form" class="auth-form">
          <label>邮箱</label>
          <input type="email" id="register-email" placeholder="your@email.com" required>
          <label>密码</label>
          <input type="password" id="register-password" placeholder="至少 6 位" required minlength="6">
          <button type="submit" class="btn-primary">注册</button>
        </form>
        <p class="auth-switch">已有账号？<a href="#" class="auth-toggle">登录</a></p>
      </div>

      <!-- Logged in -->
      <div class="auth-logged-in" style="display:none">
        <p>已登录 <strong id="user-email-display-2"></strong></p>
        <button id="btn-delete-account" class="btn-secondary btn-danger">删除账号</button>
      </div>
    </div>
  </div>
</body>
</html>
